<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbital Card Slider</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@300;400;500;700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Jost:wght@300;400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f0e8;
  --ink: #1a1410;
  --ink2: #4a3f35;
  --accent: #c4622d;
  --accent2: #2d7fc4;
  --gold: #c4a22d;
  --card-bg: #ffffff;
  --card-shadow: rgba(26,20,16,0.12);
  --orbit-color: rgba(196,98,45,0.12);
  --orbit-stroke: rgba(196,98,45,0.25);
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  overflow: hidden;
  font-family: 'Jost', sans-serif;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 60% at 50% 50%, rgba(196,98,45,0.06) 0%, transparent 70%),
    url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c4622d' fill-opacity='0.04'%3E%3Cpath d='M0 38.59l2.83-2.83 1.41 1.41L1.41 40H0v-1.41zM0 1.4l2.83 2.83 1.41-1.41L1.41 0H0v1.41zM38.59 40l-2.83-2.83 1.41-1.41L40 38.59V40h-1.41zM40 1.41l-2.83 2.83-1.41-1.41L38.59 0H40v1.41zM20 18.6l2.83-2.83 1.41 1.41L21.41 20l2.83 2.83-1.41 1.41L20 21.41l-2.83 2.83-1.41-1.41L18.59 20l-2.83-2.83 1.41-1.41L20 18.59z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}

/* ── SCENE CONTAINER ─────────────────────────────── */
#scene {
  position: relative;
  width: 800px;
  height: 800px;
  flex-shrink: 0;
}

/* SVG sits behind cards */
#orbit-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}

/* ── CARDS LAYER ─────────────────────────────────── */
#cards-layer {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}

/* ── CARD ────────────────────────────────────────── */
.orbit-card {
  position: absolute;
  width: 200px;
  height: 260px;
  top: 0; left: 0;
  pointer-events: auto;
  will-change: transform, opacity;
  transition:
    transform 0.65s cubic-bezier(0.34, 1.56, 0.64, 1),
    opacity   0.45s ease,
    filter    0.45s ease,
    box-shadow 0.45s ease;
  cursor: pointer;
  border-radius: 16px;
  overflow: hidden;
  background: var(--card-bg);
  box-shadow: 0 4px 24px var(--card-shadow);
}

.orbit-card.is-active {
  box-shadow:
    0 0 0 2px var(--accent),
    0 20px 60px rgba(196,98,45,0.28),
    0 4px 12px rgba(0,0,0,0.1);
  z-index: 10 !important;
}

.orbit-card.is-side {
  cursor: pointer;
}

.orbit-card.is-side:hover {
  filter: brightness(1.05);
}

/* Card inner layout */
.card-top {
  height: 140px;
  position: relative;
  overflow: hidden;
}

.card-number {
  position: absolute;
  top: 14px; left: 16px;
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  letter-spacing: 0.05em;
}

.card-tag {
  position: absolute;
  top: 12px; right: 12px;
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(4px);
  color: white;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 4px 8px;
  border-radius: 20px;
  font-weight: 500;
}

.card-icon {
  position: absolute;
  bottom: 16px; left: 50%;
  transform: translateX(-50%);
  font-size: 36px;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
}

.card-body {
  padding: 16px 18px 18px;
}

.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.25;
  margin-bottom: 6px;
}

.card-desc {
  font-size: 11.5px;
  color: var(--ink2);
  line-height: 1.5;
  font-weight: 300;
  margin-bottom: 12px;
}

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-meta {
  font-size: 10px;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 500;
}

.card-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
}

/* ── CENTER HUB ──────────────────────────────────── */
#center-hub {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
}

.hub-index {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1;
}

.hub-total {
  font-size: 13px;
  color: var(--ink2);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: 4px;
}

.hub-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--accent);
  margin-top: 8px;
  max-width: 120px;
  line-height: 1.3;
}

/* ── NAV ARROWS ──────────────────────────────────── */
.nav-btn {
  position: absolute;
  bottom: 32px;
  width: 48px; height: 48px;
  border-radius: 50%;
  border: 1.5px solid var(--accent);
  background: var(--card-bg);
  color: var(--accent);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  box-shadow: 0 2px 12px rgba(196,98,45,0.15);
}

.nav-btn:hover {
  background: var(--accent);
  color: white;
  transform: scale(1.08);
  box-shadow: 0 4px 20px rgba(196,98,45,0.35);
}

#btn-prev { left: calc(50% - 64px); }
#btn-next { left: calc(50% + 16px); }

/* ── DOTS ────────────────────────────────────────── */
#dots {
  position: absolute;
  bottom: 16px;
  left: 50%; transform: translateX(-50%);
  display: flex; gap: 6px; align-items: center;
}

.dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(196,98,45,0.25);
  transition: all 0.3s;
  cursor: pointer;
}

.dot.active {
  background: var(--accent);
  width: 18px;
  border-radius: 3px;
}

/* ── KEYBOARD HINT ───────────────────────────────── */
.hint {
  position: absolute;
  top: 18px; left: 50%; transform: translateX(-50%);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(74,63,53,0.5);
  pointer-events: none;
}
</style>
</head>
<body>

<div id="scene">

  <!-- SVG for orbit rings only -->
  <svg id="orbit-svg"></svg>

  <!-- HTML div cards -->
  <div id="cards-layer"></div>

  <!-- Center info -->
  <div id="center-hub">
    <div class="hub-index" id="hub-index">01</div>
    <div class="hub-total" id="hub-total">of 15</div>
    <div class="hub-title" id="hub-title"></div>
  </div>

  <!-- Nav buttons -->
  <button class="nav-btn" id="btn-prev">&#8592;</button>
  <button class="nav-btn" id="btn-next">&#8594;</button>

  <!-- Dots -->
  <div id="dots"></div>

  <div class="hint">← → keys or click prev/next cards</div>
</div>

<script>
// ─── DATA: 15 cards ──────────────────────────────────────────────────────────
const CARDS = [
  { title: 'Aurora Design',    desc: 'Visual identity & brand systems for modern ventures.',   tag: 'Branding',    icon: '🌅', grad: ['#ff6b6b','#feca57'] },
  { title: 'Deep Current',     desc: 'Subsea data infrastructure at planetary scale.',          tag: 'Research',    icon: '🌊', grad: ['#0652DD','#1289A7'] },
  { title: 'Verdant Loop',     desc: 'Regenerative supply chains for retail ecosystems.',       tag: 'Sustainability',icon:'🌿',grad: ['#1dd1a1','#10ac84'] },
  { title: 'Ember Protocol',   desc: 'Decentralized trust layers for sensitive workloads.',     tag: 'Security',    icon: '🔥', grad: ['#ee5a24','#f79f1f'] },
  { title: 'Helios Atlas',     desc: 'Satellite imagery analysis and terrain intelligence.',    tag: 'Geo-Tech',    icon: '🛰️', grad: ['#ffd32a','#c56cf0'] },
  { title: 'Nocturne AI',      desc: 'Ambient intelligence that learns your rhythm.',           tag: 'AI/ML',       icon: '🌙', grad: ['#2c2c54','#474787'] },
  { title: 'Prism Health',     desc: 'Personalised diagnostics through spectral biomarkers.',   tag: 'MedTech',     icon: '💎', grad: ['#6c5ce7','#a29bfe'] },
  { title: 'Solstice Energy',  desc: 'Peer-to-peer solar trading on micro-grids.',              tag: 'CleanTech',   icon: '☀️', grad: ['#fdcb6e','#e17055'] },
  { title: 'Phantom Routes',   desc: 'Privacy-first navigation for sensitive journeys.',        tag: 'Privacy',     icon: '👁', grad: ['#636e72','#2d3436'] },
  { title: 'Kestrel Robotics', desc: 'Agile autonomous systems for unstructured terrain.',      tag: 'Robotics',    icon: '🦅', grad: ['#00b894','#00cec9'] },
  { title: 'Lacuna Finance',   desc: 'Bridging capital gaps in emerging frontier markets.',     tag: 'FinTech',     icon: '💰', grad: ['#55efc4','#00b894'] },
  { title: 'Stratum UI',       desc: 'Layered component architecture for complex dashboards.',  tag: 'Dev Tools',   icon: '⚡', grad: ['#fd79a8','#e84393'] },
  { title: 'Meridian Maps',    desc: 'Cultural geography storytelling through data.',           tag: 'Data Viz',    icon: '🗺️', grad: ['#e17055','#d63031'] },
  { title: 'Cipher Vault',     desc: 'Hardware-secured key management for enterprises.',        tag: 'Infra',       icon: '🔐', grad: ['#2d3436','#636e72'] },
  { title: 'Zenith Studio',    desc: 'Creative workspace tools for distributed teams.',         tag: 'Productivity',icon: '🎨', grad: ['#a29bfe','#6c5ce7'] },
];

// ─── CONFIG ──────────────────────────────────────────────────────────────────
const W = 800, H = 800, CX = W/2, CY = H/2;
const RADIUS = 290;          // orbit radius
const CARD_W = 200, CARD_H = 260;
// The 3 visible slots: center=0°(right), prev & next offset by ±SPREAD
const SPREAD_DEG = 58;       // angle between active and side cards (degrees)
const SPREAD = SPREAD_DEG * Math.PI / 180;
const ACTIVE_ANGLE = -Math.PI / 2;  // 12 o'clock = top

const SCALE_ACTIVE = 1.0;
const SCALE_SIDE   = 0.72;
const OPACITY_SIDE = 0.45;

let currentIndex = 0;
let animating = false;

// ─── BUILD SVG RINGS ─────────────────────────────────────────────────────────
const svg = d3.select('#orbit-svg')
  .attr('viewBox', `0 0 ${W} ${H}`);

// Defs
const defs = svg.append('defs');
const grad = defs.append('radialGradient').attr('id','ring-fade').attr('cx','50%').attr('cy','50%').attr('r','50%');
grad.append('stop').attr('offset','0%').attr('stop-color','rgba(196,98,45,0.08)');
grad.append('stop').attr('offset','100%').attr('stop-color','rgba(196,98,45,0)');

// Fill glow disc
svg.append('circle').attr('cx',CX).attr('cy',CY).attr('r',RADIUS+10)
  .attr('fill','url(#ring-fade)');

// Outer orbit ring (dashed)
svg.append('circle').attr('cx',CX).attr('cy',CY).attr('r',RADIUS)
  .attr('fill','none')
  .attr('stroke','rgba(196,98,45,0.22)')
  .attr('stroke-width', 1.5)
  .attr('stroke-dasharray','6 8');

// Inner decorative rings
[200, 130, 70].forEach((r, i) => {
  svg.append('circle').attr('cx',CX).attr('cy',CY).attr('r',r)
    .attr('fill','none')
    .attr('stroke',`rgba(196,98,45,${0.06 - i*0.015})`)
    .attr('stroke-width', 1);
});

// Tick marks on orbit at each card slot
CARDS.forEach((_, i) => {
  const angle = (i / CARDS.length) * Math.PI * 2 - Math.PI/2;
  const r1 = RADIUS - 8, r2 = RADIUS + 8;
  svg.append('line')
    .attr('x1', CX + r1*Math.cos(angle)).attr('y1', CY + r1*Math.sin(angle))
    .attr('x2', CX + r2*Math.cos(angle)).attr('y2', CY + r2*Math.sin(angle))
    .attr('stroke','rgba(196,98,45,0.2)').attr('stroke-width',1);
});

// Active arc highlight — will update on slide
const arcGen = d3.arc()
  .innerRadius(RADIUS - 12)
  .outerRadius(RADIUS + 12)
  .startAngle(-SPREAD * 0.8)
  .endAngle(SPREAD * 0.8);

svg.append('path').attr('id','active-arc')
  .attr('transform',`translate(${CX},${CY}) rotate(${ACTIVE_ANGLE * 180/Math.PI + 90})`)
  .attr('d', arcGen())
  .attr('fill','rgba(196,98,45,0.12)')
  .attr('stroke','rgba(196,98,45,0.5)')
  .attr('stroke-width',1.5);

// ─── BUILD CARDS ─────────────────────────────────────────────────────────────
const layer = document.getElementById('cards-layer');

// Only create 3 DOM card elements (prev, active, next) — swap content on slide
// Actually: create 5 pooled cards so transitions feel smooth
// We'll use a simpler model: render all 15 but only 3 are visible/placed

function createCardEl(card, index) {
  const el = document.createElement('div');
  el.className = 'orbit-card';
  el.dataset.index = index;
  el.innerHTML = `
    <div class="card-top" style="background: linear-gradient(135deg, ${card.grad[0]}, ${card.grad[1]})">
      <span class="card-number">${String(index+1).padStart(2,'0')}</span>
      <span class="card-tag">${card.tag}</span>
      <span class="card-icon">${card.icon}</span>
    </div>
    <div class="card-body">
      <div class="card-title">${card.title}</div>
      <div class="card-desc">${card.desc}</div>
      <div class="card-footer">
        <span class="card-meta">${card.tag}</span>
        <span class="card-dot" style="background:${card.grad[0]}"></span>
      </div>
    </div>
  `;
  layer.appendChild(el);
  return el;
}

const cardEls = CARDS.map((c, i) => createCardEl(c, i));

// ─── DOTS ─────────────────────────────────────────────────────────────────────
const dotsEl = document.getElementById('dots');
CARDS.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.addEventListener('click', () => goTo(i));
  dotsEl.appendChild(d);
});

function updateDots(idx) {
  dotsEl.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === idx);
  });
}

// ─── POSITION LOGIC ───────────────────────────────────────────────────────────
// For a given card index relative to current, compute its display state
// slot: -1 = prev, 0 = active, +1 = next, else = hidden
function getSlot(cardIdx, activeIdx) {
  const n = CARDS.length;
  let diff = ((cardIdx - activeIdx) % n + n) % n;
  if (diff === n - 1) diff = -1;  // wrap: last card = prev
  return diff; // 0=active, 1=next, n-1→-1=prev, others=hidden
}

function angleForSlot(slot) {
  // slot: -1=prev, 0=active, +1=next
  return ACTIVE_ANGLE + slot * SPREAD;
}

function posForAngle(angle) {
  return {
    x: CX + RADIUS * Math.cos(angle),
    y: CY + RADIUS * Math.sin(angle),
  };
}

// Apply CSS transform to a card element to place it at orbit position
function applyCardTransform(el, angle, scale, opacity, zIndex, visible) {
  const pos = posForAngle(angle);
  // Translate so card center is on circle edge
  // Card is placed so its CENTER is at (pos.x, pos.y)
  // We rotate the card to face inward (tangent to circle)
  const rotateDeg = (angle * 180 / Math.PI) + 90; // face inward

  if (!visible) {
    el.style.opacity = '0';
    el.style.pointerEvents = 'none';
    el.style.zIndex = '0';
    // park it off-screen (no transform flash)
    el.style.transform =
      `translate(${pos.x - CARD_W/2}px, ${pos.y - CARD_H/2}px) rotate(${rotateDeg}deg) scale(${scale})`;
    return;
  }

  el.style.opacity = String(opacity);
  el.style.zIndex = String(zIndex);
  el.style.pointerEvents = opacity > 0.3 ? 'auto' : 'none';
  el.style.transform =
    `translate(${pos.x - CARD_W/2}px, ${pos.y - CARD_H/2}px) rotate(${rotateDeg}deg) scale(${scale})`;
}

// Render current state
function render(activeIdx) {
  const n = CARDS.length;
  const prevIdx = (activeIdx - 1 + n) % n;
  const nextIdx = (activeIdx + 1) % n;

  cardEls.forEach((el, i) => {
    el.classList.remove('is-active', 'is-side');

    if (i === activeIdx) {
      const angle = angleForSlot(0);
      el.classList.add('is-active');
      applyCardTransform(el, angle, SCALE_ACTIVE, 1, 10, true);
    } else if (i === prevIdx) {
      const angle = angleForSlot(-1);
      el.classList.add('is-side');
      applyCardTransform(el, angle, SCALE_SIDE, OPACITY_SIDE, 5, true);
    } else if (i === nextIdx) {
      const angle = angleForSlot(1);
      el.classList.add('is-side');
      applyCardTransform(el, angle, SCALE_SIDE, OPACITY_SIDE, 5, true);
    } else {
      // Park hidden cards at their "would-be" orbit position but invisible
      const cardAngle = ((i - activeIdx + n) % n / n) * Math.PI * 2 + ACTIVE_ANGLE;
      applyCardTransform(el, ACTIVE_ANGLE, 0.4, 0, 1, false);
    }
  });

  // Update center hub
  document.getElementById('hub-index').textContent = String(activeIdx + 1).padStart(2, '0');
  document.getElementById('hub-total').textContent = `of ${n}`;
  document.getElementById('hub-title').textContent = CARDS[activeIdx].title;

  updateDots(activeIdx);
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function goTo(newIdx) {
  if (animating) return;
  animating = true;
  currentIndex = newIdx;
  render(currentIndex);
  setTimeout(() => { animating = false; }, 680);
}

function next() {
  goTo((currentIndex + 1) % CARDS.length);
}

function prev() {
  goTo((currentIndex - 1 + CARDS.length) % CARDS.length);
}

document.getElementById('btn-next').addEventListener('click', next);
document.getElementById('btn-prev').addEventListener('click', prev);

// Click side cards to navigate
layer.addEventListener('click', (e) => {
  const card = e.target.closest('.orbit-card');
  if (!card) return;
  const idx = parseInt(card.dataset.index);
  if (idx === currentIndex) return;
  goTo(idx);
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   prev();
});

// Touch / swipe
let touchX = null;
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 40) dx < 0 ? next() : prev();
  touchX = null;
});

// Mouse wheel
let wheelCooldown = false;
document.addEventListener('wheel', e => {
  if (wheelCooldown) return;
  wheelCooldown = true;
  e.deltaY > 0 ? next() : prev();
  setTimeout(() => { wheelCooldown = false; }, 700);
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
// First render: no transition so cards snap into place
cardEls.forEach(el => el.style.transition = 'none');
render(0);
// Re-enable transitions
requestAnimationFrame(() => requestAnimationFrame(() => {
  cardEls.forEach(el => {
    el.style.transition = `
      transform  0.65s cubic-bezier(0.34, 1.56, 0.64, 1),
      opacity    0.45s ease,
      filter     0.45s ease,
      box-shadow 0.45s ease
    `;
  });
}));
</script>
</body>
</html>
